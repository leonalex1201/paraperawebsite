<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PARA PERA</title>
<meta name="description" content="Underground luxury nightclub events. Explore the next event, photo gallery, and follow PARA PERA.">
<meta name="theme-color" content="#050505">
<meta property="og:title" content="PARA PERA — We Create Memories">
<meta property="og:description" content="Underground luxury nightclub events. Neon nights, unforgettable memories.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!--  NAV  -->
<header class="site-nav">
  <div class="nav-inner">
    <a href="#home" class="nav-logo">
      <img src="logo.png" alt="PARA PERA">
    </a>
    <nav class="nav-links">
      <a href="#home" class="nav-link">Home</a>
      <a href="#next" class="nav-link">Next</a>
      <div class="nav-past" id="navPast">
        <button class="nav-past-trigger" id="navPastTrigger">
          Past <span class="chev">›</span>
        </button>
        <div class="glass-card nav-past-menu" id="navPastMenu"></div>
      </div>
    </nav>
    <button class="nav-mobile-btn" id="mobileBtn">Menu</button>
  </div>
  <div class="glass-card nav-mobile-menu" id="mobileMenu">
    <a href="#home" class="nav-link">Home</a>
    <a href="#next" class="nav-link">Next</a>
    <div id="mobilePastList"></div>
  </div>
</header>

<!-- ============ HERO ============ -->
<section class="hero" id="home">
  <div class="hero-purple-bg"></div>
  <video class="hero-video" autoplay muted loop playsinline poster="hero-bg.jpg">
    <source src="hero.mov" type="video/mp4">
    <source src="hero.mov" type="video/quicktime">
  </video>
  <div class="hero-fade"></div>
  <div class="hero-inner">
    <img src="logo.png" alt="PARA PERA" class="hero-logo animate-float">
  </div>
</section>

<!-- ============ NEXT EVENT ============ -->
<section class="section" id="next">
  <div class="section-inner">
    <h2 class="section-title font-display">Next Event</h2>

    <div class="glass-card event-card-lg">
      <div class="event-grid-lg">

        <div class="poster-wrap-lg">
          <div class="poster-glow"></div>
          <img id="nextPoster" src="" alt="Event poster">
        </div>

        <div class="event-info-lg">
          <p id="nextTagline" class="event-tagline-lg"></p>
          <h3 id="nextName" class="event-name-lg font-display"></h3>

          <dl class="event-details-lg">
            <div class="event-row-lg"><dt>Date</dt><dd id="nextDate"></dd></div>
            <div class="event-row-lg"><dt>Time</dt><dd id="nextTime"></dd></div>
            <div class="event-row-lg"><dt>Venue</dt><dd id="nextVenue"></dd></div>
            <div class="event-row-lg"><dt>Address</dt><dd id="nextAddress"></dd></div>
            <div class="event-row-lg"><dt>On Deck</dt><dd id="nextOnDeck"></dd></div>
            <div class="event-row-lg"><dt>Sponsor</dt><dd id="nextSponsor"></dd></div>
          </dl>

          <div class="countdown-lg" id="countdown">
            <div class="countdown-unit-lg"><span class="countdown-num-lg" id="cdD">--</span><span class="countdown-label-lg">Days</span></div>
            <div class="countdown-unit-lg"><span class="countdown-num-lg" id="cdH">--</span><span class="countdown-label-lg">Hours</span></div>
            <div class="countdown-unit-lg"><span class="countdown-num-lg" id="cdM">--</span><span class="countdown-label-lg">Minutes</span></div>
            <div class="countdown-unit-lg"><span class="countdown-num-lg" id="cdS">--</span><span class="countdown-label-lg">Seconds</span></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<!-- ============ PAST EVENTS ============ -->
<section class="section" id="past">
  <div class="section-inner">
    <h2 class="section-title font-display">Past Events</h2>
    <div class="past-grid" id="pastGrid"></div>
  </div>
</section>

<!-- ============ FOOTER ============ -->
<footer class="site-footer">
  <div class="footer-inner">
    <a href="#home" class="footer-logo"><img src="logo.png" alt="PARA PERA"></a>
    <div class="footer-social">
      <a href="https://www.instagram.com/paraperaproject/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">

      <a href="#" aria-label="TikTok">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43V8.66a8.16 8.16 0 0 0 4.77 1.52V6.7a4.85 4.85 0 0 1-1.84-.01Z"/></svg>
      </a>
    </div>
    <p class="footer-copy">© <span id="year"></span> PARA PERA</p>
  </div>
</footer>

<!-- ============ LIGHTBOX (shared) ============ -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">&times;</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="events.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  /* ---------- NEXT EVENT ---------- */
  document.getElementById('nextPoster').src = NEXT_EVENT.poster;
  document.getElementById('nextTagline').textContent = NEXT_EVENT.tagline;
  document.getElementById('nextName').textContent = NEXT_EVENT.name;
  document.getElementById('nextDate').textContent = NEXT_EVENT.date;
  document.getElementById('nextTime').textContent = NEXT_EVENT.time;
  document.getElementById('nextOnDeck').textContent = NEXT_EVENT.onDeck.join(' · ');
  document.getElementById('nextVenue').textContent = NEXT_EVENT.venue || '';
  document.getElementById('nextAddress').textContent = NEXT_EVENT.address || '';
  document.getElementById('nextSponsor').textContent = NEXT_EVENT.sponsor;

  function updateCountdown(){
    const target = new Date(NEXT_EVENT.iso).getTime();
    const diff = Math.max(0, target - Date.now());
    document.getElementById('cdD').textContent = String(Math.floor(diff/86400000)).padStart(2,'0');
    document.getElementById('cdH').textContent = String(Math.floor((diff/3600000)%24)).padStart(2,'0');
    document.getElementById('cdM').textContent = String(Math.floor((diff/60000)%60)).padStart(2,'0');
    document.getElementById('cdS').textContent = String(Math.floor((diff/1000)%60)).padStart(2,'0');
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  /* ---------- NAV: past dropdown (desktop) ---------- */
  const navPastTrigger = document.getElementById('navPastTrigger');
  const navPastMenu = document.getElementById('navPastMenu');
  navPastMenu.innerHTML = PAST_EVENTS.map(e =>
    `<a href="past.html?event=${e.slug}">${e.label}</a>`
  ).join('');

  navPastTrigger.addEventListener('click', ()=>{
    navPastTrigger.classList.toggle('open');
    navPastMenu.classList.toggle('open');
  });
  document.addEventListener('click', (e)=>{
    if(!document.getElementById('navPast').contains(e.target)){
      navPastTrigger.classList.remove('open');
      navPastMenu.classList.remove('open');
    }
  });

  /* ---------- NAV: mobile menu ---------- */
  const mobileBtn = document.getElementById('mobileBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  document.getElementById('mobilePastList').innerHTML =
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:6px;">' +
    PAST_EVENTS.map(e => `<a href="past.html?event=${e.slug}" class="nav-link">${e.label}</a>`).join('') +
    '</div>';

  mobileBtn.addEventListener('click', ()=>{
    const open = mobileMenu.classList.toggle('open');
    mobileBtn.textContent = open ? 'Close' : 'Menu';
  });

  /* ---------- PAST EVENTS GRID ---------- */
  const pastGrid = document.getElementById('pastGrid');
  if(PAST_EVENTS.length === 0){
    pastGrid.innerHTML = '<div class="empty-note">Δεν υπάρχουν past events ακόμα.</div>';
  } else {
    // Use poster as cover if no photos yet, otherwise first photo
    pastGrid.className = PAST_EVENTS.length === 1 ? 'past-grid-single' : 'past-grid';
    pastGrid.innerHTML = PAST_EVENTS.map(e=>{
      const photos = getPhotoUrls(e);
      const cover = photos.length > 0 ? photos[0] : (e.poster || '');
      const cardClass = PAST_EVENTS.length === 1 ? 'glass-card past-card-single' : 'glass-card past-card';
      return `
        <a href="past.html?event=${e.slug}" class="${cardClass}">
          <div class="past-card-img"><img src="${cover}" alt="${e.name}" loading="lazy"></div>
          <div class="past-card-body">
            <div class="past-card-label">${e.label}</div>
            <div class="past-card-name">${e.name}</div>
            <div class="past-card-date">${e.date}</div>
          </div>
        </a>`;
    }).join('');
  }
</script>

</body>
</html>
